<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="sphere" cx="42%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#e2ec5e"/>
      <stop offset="45%" stop-color="#7cc62c"/>
      <stop offset="100%" stop-color="#4ea01f"/>
    </radialGradient>
    <radialGradient id="sickL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#caa93c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#caa93c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sickR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#caa93c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#caa93c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- transparent background: only the face circle is painted -->
